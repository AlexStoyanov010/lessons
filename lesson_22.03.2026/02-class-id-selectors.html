<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class and ID Selectors</title>
    <link rel="stylesheet" href="alex1.css">
  </head>
  <body>
    <p div style="background-color: rgb(255, 167, 167); font-family: Verdana, DejaVu Sans, sans-serif; font-weight: bold;" >Number 1 - I'm a class!</p>
    <div style="color: #0000ff; font-size: 36px;">Number 2 - I'm one ID.</div>
    <p style="background-color: rgb(255, 167, 167); font-family: Verdana, DejaVu Sans, sans-serif; font-size: 36px; font-weight: bold;">Number 3 - I'm a class, but cooler!</p>
    <div style="background-color: hsl(120, 100%, 75%); font-weight: bold;">Number 4 - I'm another ID.</div>
    <p style="background-color: rgb(255, 167, 167); font-family: Verdana, DejaVu Sans, sans-serif;">Number 5 - I'm a class!</p>
  </body>
</html>
